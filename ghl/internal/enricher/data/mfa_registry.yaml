  # ─────────────────────────────────────────────────────────────────────────────
  # STANDALONE — User-facing apps deployed independently (NOT via SPMT)
  # These are reached directly by prospects, contacts, students, clients.
  # backend_api_prefixes drives the frontend→backend join in bidirectional tracing.
  # ─────────────────────────────────────────────────────────────────────────────

  - kind: standalone
    key: funnel-website-renderer
    display_name: Funnel / Landing Page (Public)
    github_repo: ghl-funnel-website
    deploy_target: cloud-run
    url_pattern: "{customDomain} | *.myfunnels.com | *.leadpages.net | /funnel-preview/:id"
    backend_api_prefixes:
      - /funnels/
      - /websites/
      - /v1/locations/
      - /v2/funnels/
      - /contacts/
      - /forms/
    product_area: "Funnels & Websites — Public Renderer"
    owner: "@leadgen-funnels"
    user_type: prospect
    deploy_notes: "Serves public funnel/landing pages to prospects. Custom domain or *.myfunnels.com."

  - kind: standalone
    key: calendar-booking-widget
    display_name: Calendar Booking Page (Public)
    github_repo: automation-calendars-frontend-monorepo
    deploy_target: cdn-embed
    url_pattern: "api.leadconnectorhq.com/widget/booking/:calendarId | msgsndr.com/widget/booking/:calendarId"
    backend_api_prefixes:
      - /calendars/
      - /appointments/
      - /v1/appointments/
      - /v1/locations/:locationId/calendars
    product_area: "Calendar & Scheduling — Public Booking"
    owner: "@automation-calendar"
    user_type: prospect
    deploy_notes: "Public booking widget. Embedded via iframe or direct URL. Used by prospects to book appointments."

  - kind: standalone
    key: form-survey-embed
    display_name: Form / Survey Embed (Public)
    github_repo: ghl-form-embed
    deploy_target: cdn-js-embed
    url_pattern: "<script> embed on any website | /{locationId}/survey/:surveyId | /{locationId}/form/:formId"
    backend_api_prefixes:
      - /forms/
      - /surveys/
      - /v1/locations/:locationId/forms
      - /v1/contacts/
      - /contacts/
    product_area: "Forms & Surveys — Public Embed"
    owner: "@leadgen-forms"
    user_type: prospect-contact
    deploy_notes: "Single JS file embedded on customer websites. Also renders public form/survey pages directly."

  - kind: standalone
