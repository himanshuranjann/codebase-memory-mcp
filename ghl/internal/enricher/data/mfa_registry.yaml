# mfa_registry.yaml — hand-maintained registry of all GHL frontend apps.
#
# Three kinds of app surface:
#   spmt       — Agency/account admin apps loaded via Module Federation inside
#                app.gohighlevel.com (the SPMT shell). End-user = agency owner
#                or sub-account admin. federation_key matches the TypeScript key
#                in spm-ts/src/config/runtimeRemoteApps.ts or async-remoteApps.ts.
#   standalone — Independently deployed user-facing frontends. Prospects, contacts,
#                students, clients — not agency admins — hit these URLs directly.
#   ssr        — Nuxt 3 SSR apps deployed to per-client custom domains (RevEx
#                membership, communities, client portal).
#
# Maintenance:
#   - Add an entry when a new MFA app ships or a new user-facing app launches.
#   - Update backend_api_prefixes when a standalone/ssr app starts calling a new service.
#   - route_prefixes for SPMT apps come from spm-ts/src/routes/ — keep in sync.
#   - Missing coverage returns an empty []MFAAppRef — callers surface the gap explicitly.
#
# Reviewed quarterly alongside product_map.yaml.
# Schema: see MFAAppEntry in mfa_registry.go.

